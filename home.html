<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Simulator</title>
<style>

body{
font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

textarea,input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:14px;
}

button{
background:#3b82f6;
border:none;
color:white;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#2563eb;
}

.step{
margin-top:10px;
font-size:13px;
color:#94a3b8;
}

.chunk{
background:#334155;
padding:10px;
border-radius:6px;
margin-top:5px;
font-size:13px;
}

.highlight{
background:#22c55e;
color:black;
}

.result{
margin-top:10px;
background:#475569;
padding:10px;
border-radius:6px;
}

</style>
</head>

<body>

<h1>RAG Simulator</h1>

<div class="container">

<div class="card">

<h3>1. Knowledge Base</h3>

<textarea id="docs" rows="6">
RAG stands for Retrieval Augmented Generation. It improves LLM answers using external knowledge.
Vector databases store embeddings and allow semantic search.
Chunking splits documents into smaller pieces before embedding.
</textarea>

<button onclick="processDocs()">Chunk & Embed</button>

<div class="step">Chunks & Embeddings</div>
<div id="chunks"></div>

</div>

<div class="card">

<h3>2. Ask Question</h3>

<input id="query" placeholder="Ask a question...">

<button onclick="runQuery()">Run RAG</button>

<div class="step">Query Embedding</div>
<div id="queryEmbed"></div>

<div class="step">Top Retrieved Chunks</div>
<div id="retrieved"></div>

<div class="step">LLM Answer</div>
<div id="answer"></div>

</div>

</div>

<script>

let vectorDB=[]

function simpleEmbedding(text){

let vec=[0,0,0,0,0]

for(let i=0;i<text.length;i++){

vec[i%5]+=text.charCodeAt(i)

}

return vec

}

function cosine(a,b){

let dot=0
let magA=0
let magB=0

for(let i=0;i<a.length;i++){

dot+=a[i]*b[i]
magA+=a[i]*a[i]
magB+=b[i]*b[i]

}

return dot/(Math.sqrt(magA)*Math.sqrt(magB))

}

function processDocs(){

let text=document.getElementById("docs").value

let rawChunks=text.split(".")

vectorDB=[]

let chunkDiv=document.getElementById("chunks")
chunkDiv.innerHTML=""

rawChunks.forEach(c=>{

let chunk=c.trim()

if(chunk.length<5)return

let embed=simpleEmbedding(chunk)

vectorDB.push({chunk,embed})

let el=document.createElement("div")
el.className="chunk"
el.innerHTML="<b>Chunk:</b> "+chunk+"<br><b>Embedding:</b> "+JSON.stringify(embed)

chunkDiv.appendChild(el)

})

}

function runQuery(){

let q=document.getElementById("query").value

let qEmbed=simpleEmbedding(q)

document.getElementById("queryEmbed").innerText=JSON.stringify(qEmbed)

let scored=[]

vectorDB.forEach(item=>{

let score=cosine(qEmbed,item.embed)

scored.push({...item,score})

})

scored.sort((a,b)=>b.score-a.score)

let top=scored.slice(0,2)

let rDiv=document.getElementById("retrieved")
rDiv.innerHTML=""

top.forEach(t=>{

let el=document.createElement("div")
el.className="chunk highlight"
el.innerHTML="<b>Score:</b> "+t.score.toFixed(3)+"<br>"+t.chunk

rDiv.appendChild(el)

})

let context=top.map(x=>x.chunk).join(" ")

let answer="Based on retrieved knowledge: "+context

document.getElementById("answer").innerHTML="<div class='result'>"+answer+"</div>"

}

</script>

</body>
</html>
